{% extends 'base.html' %}
{% load static %}

{% block title %}Payment Failed{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-16">
    <div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-8 text-center">
        <div class="mb-6">
            <svg class="w-16 h-16 text-red-500 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </div>
        
        <h1 class="text-2xl font-bold text-gray-800 mb-4">Payment Failed</h1>
        <p class="text-gray-600 mb-8">We couldn't process your payment. Please try again or choose a different payment method.</p>
        
        <div class="space-y-4">
            <a href="{{ request.META.HTTP_REFERER }}" class="block w-full bg-primary text-white py-2 px-4 rounded-lg hover:bg-primary-dark transition-colors duration-200">
                Try Again
            </a>
            <a href="{% url 'cars:seller-dashboard' %}" class="block w-full bg-gray-100 text-gray-700 py-2 px-4 rounded-lg hover:bg-gray-200 transition-colors duration-200">
                Go to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
